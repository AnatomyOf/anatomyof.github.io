name: Build and deploy

# Builds the app from the source repo (LunarWerxs/anatomyof) and publishes it
# to this repo's GitHub Pages. Uses the built-in GITHUB_TOKEN — no secrets.
#
# Triggers:
#   - workflow_dispatch:   manual "Run workflow" button
#   - repository_dispatch: pinged by the source repo on push (event_type: build)
#   - schedule:            safety-net rebuild a few times a day
#   - push:                when this workflow file itself changes

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build]
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          repository: LunarWerxs/anatomyof
          ref: main

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: app
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
