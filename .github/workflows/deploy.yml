name: Build and deploy

# Builds the app from the source repo (LunarWerxs/anatomyof) and publishes it
# to this repo's GitHub Pages. Uses the built-in GITHUB_TOKEN — no secrets.
#
# Triggers:
#   - workflow_dispatch:   manual "Run workflow" button
#   - repository_dispatch: pinged by the source repo on push (event_type: build)
#   - schedule:            safety-net rebuild a few times a day
#   - push:                when this workflow file itself changes

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build]
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          repository: LunarWerxs/anatomyof
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: app
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      # This org-root Pages backend fails ~half the time — sometimes loudly
      # ("Deployment failed, try again later"), and sometimes SILENTLY (the
      # deploy step reports success but never promotes the artifact). So we
      # interleave deploy attempts with a live-asset check: after each deploy,
      # poll the origin for the freshly built asset, and only retry if it is
      # still not served. This catches BOTH failure modes.

      - name: Find expected asset
        id: asset
        run: |
          asset=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' app/dist/index.html | head -1)
          echo "path=$asset" >> "$GITHUB_OUTPUT"
          echo "Expecting live asset: $asset"

      - name: Deploy — attempt 1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Check live — after 1
        id: check1
        run: |
          for i in $(seq 1 9); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://anatomyof.github.io/${{ steps.asset.outputs.path }}")
            echo "poll $i: HTTP $code"
            [ "$code" = "200" ] && { echo "live=true" >> "$GITHUB_OUTPUT"; exit 0; }
            sleep 10
          done
          echo "live=false" >> "$GITHUB_OUTPUT"

      - name: Deploy — attempt 2
        if: steps.check1.outputs.live != 'true'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Check live — after 2
        id: check2
        if: steps.check1.outputs.live != 'true'
        run: |
          for i in $(seq 1 9); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://anatomyof.github.io/${{ steps.asset.outputs.path }}")
            echo "poll $i: HTTP $code"
            [ "$code" = "200" ] && { echo "live=true" >> "$GITHUB_OUTPUT"; exit 0; }
            sleep 10
          done
          echo "live=false" >> "$GITHUB_OUTPUT"

      - name: Deploy — attempt 3
        if: steps.check1.outputs.live != 'true' && steps.check2.outputs.live != 'true'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Verify the new build is served
        run: |
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://anatomyof.github.io/${{ steps.asset.outputs.path }}")
            echo "poll $i: HTTP $code"
            [ "$code" = "200" ] && { echo "Live ✓"; exit 0; }
            sleep 15
          done
          echo "::error::New build was not served after 3 deploy attempts — re-run this workflow."
          exit 1
